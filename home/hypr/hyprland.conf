
###############################################################################
# Monitors — adjust to your setup. Run `hyprctl monitors` to see options.
###############################################################################
monitor = , preferred, auto, 1                # auto-detect, no scaling
# Example for an external 4K at 100% scale:
# monitor = DP-1, 3840x2160@60, 0x0, 1

###############################################################################
# Environment
###############################################################################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

###############################################################################
# Programs (referenced in keybinds)
###############################################################################
$mod      = SUPER
$term     = ghostty
$browser  = chromium
$menu     = fuzzel
$filemgr  = nautilus

###############################################################################
# Input
###############################################################################
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        clickfinger_behavior = true
    }
}

###############################################################################
# General — gaps, borders, layout
###############################################################################
general {
    gaps_in  = 4
    gaps_out = 8
    border_size = 2

    # Catppuccin Mocha — mauve→lavender gradient when active, surface0 when not
    col.active_border   = rgba(cba6f7ee) rgba(b4befeee) 45deg
    col.inactive_border = rgba(313244aa)

    layout = dwindle               # dwindle splits left/right then up/down
    allow_tearing = false
    resize_on_border = true
}

###############################################################################
# Decoration — rounded corners, light blur
###############################################################################
decoration {
    rounding = 8
    active_opacity   = 1.0
    inactive_opacity = 0.97

    blur {
        enabled  = true
        size     = 6
        passes   = 2
        new_optimizations = true
        ignore_opacity   = false
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

###############################################################################
# Animations — smooth, springy, not too slow
###############################################################################
animations {
    enabled = true

    bezier = wind,    0.05, 0.9,  0.1, 1.05
    bezier = winIn,   0.1,  1.1,  0.1, 1.1
    bezier = winOut,  0.3, -0.3,  0,   1
    bezier = liner,   1,    1,    1,   1

    animation = windows,     1, 6,  wind,   slide
    animation = windowsIn,   1, 6,  winIn,  slide
    animation = windowsOut,  1, 5,  winOut, slide
    animation = windowsMove, 1, 5,  wind,   slide
    animation = border,      1, 1,  liner
    animation = borderangle, 1, 30, liner,  loop
    animation = fade,        1, 10, default
    animation = workspaces,  1, 5,  wind
}

###############################################################################
# Layouts
###############################################################################
dwindle {
    preserve_split = true
}

###############################################################################
# Misc
###############################################################################
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    animate_manual_resizes = true
}

###############################################################################
# Window rules
###############################################################################



windowrule = float on, match:class net-tui
windowrule = float on, match:class bt-tui
windowrule = size 760 520, match:class net-tui
windowrule = size 760 520, match:class bt-tui
windowrule = center on, match:class net-tui
windowrule = center on, match:class bt-tui



###############################################################################
# Keybindings — Omarchy-style
###############################################################################

# ---- Applications ----
bind = $mod,        RETURN, exec, $term
bind = $mod ALT,    RETURN, exec, $term -e tmux new -A -s Work
bind = $mod SHIFT,  RETURN, exec, $browser
bind = $mod SHIFT,  B,      exec, $browser
bind = $mod,        SPACE,  exec, $menu
bind = $mod SHIFT,  F,      exec, $filemgr
bind = $mod SHIFT, W, exec, awww img "$(find ~/Pictures/wallpapers -type f | fuzzel --dmenu)"


# -----Power Menu--------
bind = $mod, ESCAPE, exec, powermenu

# ------Clipboard history-------

bind = $mod CTRL, V, exec, cliphist list | fuzzel --dmenu --with-nth 2 | cliphist decode | wl-copy

# ---- Window management ----
bind = $mod,        W, killactive,
bind = $mod,        T, togglefloating,
bind = $mod,        F, fullscreen, 0
bind = $mod ALT,    F, fullscreen, 1
bind = $mod CTRL,   J, layoutmsg, togglesplit     # avoid clash with hjkl focus
bind = $mod SHIFT,  E, exit,            # logout
bind = $mod CTRL,   L, exec, hyprlock

# ---- Focus: hjkl + arrows ----
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# ---- Swap windows ----
bind = $mod SHIFT, H,     swapwindow, l
bind = $mod SHIFT, L,     swapwindow, r
bind = $mod SHIFT, K,     swapwindow, u
bind = $mod SHIFT, J,     swapwindow, d
bind = $mod SHIFT, left,  swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up,    swapwindow, u
bind = $mod SHIFT, down,  swapwindow, d

# ---- Workspaces 1-10 ----
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ---- Cycle ----
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

# ---- Mouse: drag-to-move, drag-to-resize ----
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ---- Volume / brightness / media (laptop Fn keys) ----
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ---- Screenshots (hyprshot) ----
bind = ,       Print, exec, hyprshot -m region
bind = SHIFT,  Print, exec, hyprshot -m window
bind = CTRL,   Print, exec, hyprshot -m output

###############################################################################
# Autostart
###############################################################################
exec-once = waybar
exec-once = mako
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = awww-daemon
exec-once = sleep 2 && awww img ~/nixos-config/wallpapers/wall.jpg
exec-once = hypridle
